<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Rex Runner - Free Move & Vivid Color Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0f0f1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 250px;
        }
        canvas {
            background-color: #1a1a2e;
            border-bottom: 3px solid #485460;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            display: block;
            border-radius: 8px;
        }
        .instruction {
            margin-top: 20px;
            color: #8fa0a8;
            font-size: 14px;
            text-align: center;
            line-height: 1.6;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(26, 26, 46, 0.85);
            color: #00d2d3;
            transition: opacity 0.3s;
            border-radius: 8px;
        }
        #overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .game-over-text {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 6px;
            margin-bottom: 12px;
            color: #ff4757;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
        }
        #overlaySubtext {
            color: #fff;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="250"></canvas>
        <div id="overlay">
            <div class="game-over-text" id="overlayText">FREE MOVE DINO</div>
            <div id="overlaySubtext">스페이스바를 누르면 시작합니다.</div>
        </div>
    </div>

    <div class="instruction">
        시작/점프: Spacebar 또는 위쪽 화살표(↑) | 숙이기/빠른낙하: 아래쪽 화살표(↓)<br>
        앞뒤 이동: 왼쪽(←) / 오른쪽(→) 화살표 키
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const overlayText = document.getElementById('overlayText');
        const overlaySubtext = document.getElementById('overlaySubtext');

        const CONFIG = {
            gravity: 0.6,
            jumpForce: -12,
            duckGravity: 1.5,
            moveSpeed: 5,         // 좌우 이동 속도
            startSpeed: 6,
            maxSpeed: 14,
            speedAcceleration: 0.0006,
            spawnInterval: { min: 70, max: 140 }
        };

        let gameState = 'START'; 
        let score = 0;
        let highScore = 0;
        let gameSpeed = CONFIG.startSpeed;
        let nextSpawnTime = 0;
        let frameCount = 0;
        
        let obstacles = [];
        let keys = {};

        // 색상 팔레트 전면 다원화 개편
        const COLORS = {
            dinoBody: '#ff4757',    // 비비드 네온 핑크 (선인장과 보색)
            dinoAccent: '#7bed9f',  // 파스텔 라임 옐로우-그린
            dinoLegs: '#ffa502',    // 오렌지 골드
            cactus: '#2ed573',      // 딥 에메랄드 그린
            cactusFlower: '#54a0ff',// 미스틱 라이트 블루
            birdBody: '#1e90ff',    // 도져 블루
            birdBeak: '#ff7f50',    // 코랄 오렌지
            uiText: '#c8d6e5'
        };

        // 1. 공룡 객체 (X축 이동 제어 로직 추가)
        const dino = {
            x: 80,
            y: 190,
            width: 44,
            height: 47,
            normalHeight: 47,
            duckHeight: 30,
            vy: 0,
            isJumping: false,
            isDucking: false,
            animFrame: 0,
            
            update() {
                // [신규 기믹] 좌우 화살표 키 입력을 반영한 X축 이동 및 스크린 락 처리
                if (keys['ArrowLeft']) {
                    this.x -= CONFIG.moveSpeed;
                    if (this.x < 10) this.x = 10; // 왼쪽 벽 충돌 방지
                }
                if (keys['ArrowRight']) {
                    this.x += CONFIG.moveSpeed;
                    if (this.x > 400) this.x = 400; // 지나치게 전진하는 현상 제한 (맵 중앙선 한계)
                }

                if (keys['ArrowDown'] && !this.isJumping) {
                    this.isDucking = true;
                    this.height = this.duckHeight;
                } else {
                    this.isDucking = false;
                    this.height = this.normalHeight;
                }

                if ((keys['Space'] || keys['ArrowUp']) && !this.isJumping && !this.isDucking) {
                    this.vy = CONFIG.jumpForce;
                    this.isJumping = true;
                }

                const currentGravity = (this.isJumping && keys['ArrowDown']) ? CONFIG.duckGravity : CONFIG.gravity;
                this.vy += currentGravity;
                this.y += this.vy;

                const groundY = canvas.height - this.height - 10; 
                if (this.y >= groundY) {
                    this.y = groundY;
                    this.vy = 0;
                    this.isJumping = false;
                }

                if (!this.isJumping) {
                    this.animFrame++;
                }
            },

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                const leftFootDown = Math.floor(this.animFrame / 6) % 2 === 0;

                if (!this.isDucking) {
                    // --- 비비드 핑크 공룡 ---
                    ctx.fillStyle = COLORS.dinoBody;
                    ctx.fillRect(16, 0, 24, 16);
                    ctx.fillRect(12, 4, 4, 12);
                    ctx.fillRect(16, 16, 10, 8);
                    ctx.fillRect(4, 20, 20, 14);
                    ctx.fillRect(0, 24, 4, 8); 
                    ctx.fillRect(8, 34, 12, 4);

                    // 배 포인트 (라임 그린)
                    ctx.fillStyle = COLORS.dinoAccent;
                    ctx.fillRect(16, 20, 6, 10);
                    ctx.fillRect(24, 22, 4, 4); // 앞손
                    ctx.fillStyle = COLORS.dinoBody;
                    ctx.fillRect(26, 26, 4, 2);

                    // 눈 
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(22, 3, 4, 4);
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(24, 3, 2, 2);

                    // 다리 (골드 오렌지)
                    ctx.fillStyle = COLORS.dinoLegs;
                    if (this.isJumping) {
                        ctx.fillRect(10, 38, 4, 6);
                        ctx.fillRect(18, 38, 4, 6);
                    } else {
                        if (leftFootDown) {
                            ctx.fillRect(9, 38, 4, 6);
                            ctx.fillRect(9, 44, 6, 3);
                        } else {
                            ctx.fillRect(9, 38, 4, 3);
                        }
                        if (!leftFootDown) {
                            ctx.fillRect(17, 38, 4, 6);
                            ctx.fillRect(17, 44, 6, 3);
                        } else {
                            ctx.fillRect(17, 38, 4, 3);
                        }
                    }
                } else {
                    // --- 숙인 상태 공룡 ---
                    ctx.fillStyle = COLORS.dinoBody;
                    ctx.fillRect(0, 10, 32, 14);
                    ctx.fillRect(4, 6, 24, 4);
                    ctx.fillRect(28, 2, 22, 12); 
                    
                    ctx.fillStyle = COLORS.dinoAccent;
                    ctx.fillRect(12, 14, 16, 8);
                    ctx.fillRect(24, 20, 4, 4);

                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(38, 5, 4, 4);
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(40, 5, 2, 2);

                    ctx.fillStyle = COLORS.dinoLegs;
                    if (leftFootDown) {
                        ctx.fillRect(10, 24, 4, 4);
                        ctx.fillRect(10, 28, 6, 2);
                    } else {
                        ctx.fillRect(18, 24, 4, 4);
                        ctx.fillRect(18, 28, 6, 2);
                    }
                }
                ctx.restore();
            },

            reset() {
                this.x = 80;
                this.y = canvas.height - this.normalHeight - 10;
                this.vy = 0;
                this.isJumping = false;
                this.isDucking = false;
                this.height = this.normalHeight;
                this.animFrame = 0;
            }
        };

        // 2. 장애물 클래스 (완벽하게 대비되는 딥 에메랄드 그린 적용)
        class Obstacle {
            constructor() {
                this.x = canvas.width;
                this.type = Math.random() < 0.25 ? 'BIRD' : 'CACTUS';
                this.animFrame = 0;
                
                if (this.type === 'CACTUS') {
                    this.variant = Math.floor(Math.random() * 3); 
                    if (this.variant === 0) {
                        this.width = 16; this.height = 35;
                    } else if (this.variant === 1) {
                        this.width = 24; this.height = 46;
                    } else {
                        this.width = 45; this.height = 46;
                    }
                    this.y = canvas.height - this.height - 10;
                } else {
                    this.width = 34;
                    this.height = 24;
                    this.y = Math.random() < 0.5 ? 135 : 170;
                }
            }

            update(speed) {
                this.x -= speed;
                this.animFrame++;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                if (this.type === 'CACTUS') {
                    ctx.fillStyle = COLORS.cactus; // 확 튀는 그린 컬러 대입
                    if (this.variant === 0) {
                        ctx.fillRect(6, 0, 4, this.height);
                        ctx.fillRect(2, 10, 4, 4); ctx.fillRect(0, 12, 3, 10);
                        ctx.fillRect(10, 14, 4, 4); ctx.fillRect(13, 16, 3, 8);
                        
                        ctx.fillStyle = COLORS.cactusFlower; // 블루 꽃 포인트
                        ctx.fillRect(6, -4, 4, 4);
                    } else if (this.variant === 1) {
                        ctx.fillRect(9, 0, 6, this.height);
                        ctx.fillRect(3, 12, 6, 6); ctx.fillRect(0, 16, 4, 15);
                        ctx.fillRect(15, 18, 6, 6); ctx.fillRect(20, 22, 4, 12);
                        
                        ctx.fillStyle = COLORS.cactusFlower;
                        ctx.fillRect(10, -4, 4, 4);
                    } else {
                        ctx.fillRect(6, 4, 5, this.height - 4);
                        ctx.fillRect(0, 16, 4, 15); ctx.fillRect(3, 12, 4, 5);
                        ctx.fillRect(22, 0, 6, this.height);
                        ctx.fillRect(14, 14, 8, 5); ctx.fillRect(14, 18, 4, 15);
                        ctx.fillRect(28, 18, 6, 5); ctx.fillRect(32, 22, 4, 12);
                        ctx.fillRect(38, 10, 4, this.height - 10);
                        
                        ctx.fillStyle = COLORS.cactusFlower;
                        ctx.fillRect(6, 0, 4, 4);
                        ctx.fillRect(23, -4, 4, 4);
                    }
                } else {
                    // 블루 익룡 드로잉
                    const wingUp = Math.floor(this.animFrame / 8) % 2 === 0;
                    
                    ctx.fillStyle = COLORS.birdBeak;
                    ctx.fillRect(0, 8, 8, 4);
                    
                    ctx.fillStyle = COLORS.birdBody;
                    ctx.fillRect(8, 8, 6, 6);
                    ctx.fillRect(14, 4, 8, 6);
                    ctx.fillRect(14, 10, 14, 6);
                    ctx.fillRect(28, 12, 6, 3); 

                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(15, 5, 2, 2);

                    if (wingUp) {
                        ctx.fillRect(16, 0, 4, 10);
                        ctx.fillStyle = COLORS.birdBeak; 
                        ctx.fillRect(12, 2, 4, 4);
                    } else {
                        ctx.fillRect(16, 16, 4, 8);
                        ctx.fillStyle = COLORS.birdBeak;
                        ctx.fillRect(18, 20, 4, 4);
                    }
                }
                ctx.restore();
            }
        }

        // 3. 방향키 파이프라인 연동 (좌우 매핑 활성화)
        window.addEventListener('keydown', (e) => {
            const code = e.code === 'Space' ? 'Space' : e.key;
            keys[code] = true;

            if (code === 'Space' || code === 'ArrowUp') {
                if (gameState === 'START' || gameState === 'GAMEOVER') {
                    initGame();
                }
            }
            if(['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(code)) {
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            const code = e.code === 'Space' ? 'Space' : e.key;
            keys[code] = false;
        });

        function initGame() {
            obstacles = [];
            score = 0;
            gameSpeed = CONFIG.startSpeed;
            frameCount = 0;
            nextSpawnTime = 0;
            dino.reset();
            gameState = 'PLAYING';
            overlay.classList.add('hidden');
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            if (score > highScore) {
                highScore = score;
            }
            overlayText.innerText = 'GAME OVER';
            overlaySubtext.innerText = '스페이스바를 눌러 다시 시작하세요.';
            overlay.classList.remove('hidden');
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function drawUI() {
            ctx.fillStyle = COLORS.uiText;
            ctx.font = "bold 16px 'Courier New'";
            const padScore = (num) => String(Math.floor(num)).padStart(5, '0');
            ctx.fillText(`HI ${padScore(highScore)}  ${padScore(score)}`, canvas.width - 150, 30);
        }

        function drawGround() {
            ctx.beginPath();
            ctx.strokeStyle = '#485460';
            ctx.lineWidth = 3;
            ctx.moveTo(0, canvas.height - 10);
            ctx.lineTo(canvas.width, canvas.height - 10);
            ctx.stroke();
            
            ctx.fillStyle = '#3c6382';
            let speedOffset = (gameState === 'PLAYING') ? (score * 5) % 800 : 0;
            for(let i=0; i<800; i+=80) {
                let currentX = i - speedOffset;
                if(currentX < 0) currentX += 800;
                ctx.fillRect(currentX, canvas.height - 6, 4, 2);
                ctx.fillRect(currentX + 30, canvas.height - 4, 2, 1);
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGround();

            if (gameState === 'PLAYING') {
                frameCount++;
                score += 0.15;
                
                if (gameSpeed < CONFIG.maxSpeed) {
                    gameSpeed += CONFIG.speedAcceleration;
                }

                dino.update();

                if (frameCount >= nextSpawnTime) {
                    obstacles.push(new Obstacle());
                    frameCount = 0;
                    nextSpawnTime = CONFIG.spawnInterval.min + Math.random() * (CONFIG.spawnInterval.max - CONFIG.spawnInterval.min);
                }

                for (let i = obstacles.length - 1; i >= 0; i--) {
                    obstacles[i].update(gameSpeed);
                    obstacles[i].draw();

                    // 실시간 위치 반영 히트박스 판정
                    const dinoHitBox = {
                        x: dino.x + 6, 
                        y: dino.y + 2,
                        width: dino.isDucking ? dino.width - 4 : dino.width - 12,
                        height: dino.height - 4
                    };

                    if (checkCollision(dinoHitBox, obstacles[i])) {
                        gameOver();
                    }

                    if (obstacles[i].x + obstacles[i].width < 0) {
                        obstacles.splice(i, 1);
                    }
                }
            } else {
                obstacles.forEach(obs => obs.draw());
            }

            dino.draw();
            drawUI();

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
