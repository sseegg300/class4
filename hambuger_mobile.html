<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>버거 타워 - 햄버거 쌓기 게임</title>
<style>
  :root{--ink:#31261d;--cream:#fff7df;--orange:#ff9f1c;--red:#ef476f;--green:#43aa8b;--blue:#4d96ff;--shadow:0 14px 40px rgba(75,46,18,.18)}
  *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif;color:var(--ink);background:linear-gradient(135deg,#ffd166,#ffb347 48%,#ff8c42);overflow-x:hidden}
  button{font:inherit}.app{width:min(1180px,100%);margin:auto;padding:18px}
  header{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:14px}
  .brand{display:flex;align-items:center;gap:12px}.logo{width:58px;height:58px;position:relative;filter:drop-shadow(0 5px 4px rgba(0,0,0,.15))}
  .logo span{position:absolute;left:4px;width:50px;border-radius:999px}.logo .t{top:5px;height:20px;background:#f5b642;border-bottom:4px solid #d88b1d}.logo .l{top:27px;height:7px;background:#79bd48}.logo .p{top:35px;height:9px;background:#754522}.logo .b{top:45px;height:12px;background:#f5b642;border-top:3px solid #d88b1d}
  h1{font-size:clamp(1.5rem,3vw,2.35rem);margin:0;letter-spacing:-.04em}.subtitle{margin:2px 0 0;color:#765638;font-weight:700}
  .top-actions{display:flex;gap:8px}.icon-btn{border:0;border-radius:14px;background:#fff8;backdrop-filter:blur(8px);padding:11px 14px;cursor:pointer;font-weight:900;box-shadow:0 5px 14px #8f4c1925}
  .hud{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}.stat{background:#fff9;border:2px solid #fff8;padding:12px 14px;border-radius:18px;box-shadow:0 6px 18px #8f4c1920}.stat b{display:block;font-size:.78rem;color:#89633f}.stat strong{font-size:1.5rem}.time-low strong{color:#d7263d;animation:pulse .65s infinite alternate}@keyframes pulse{to{transform:scale(1.08)}}
  main{display:grid;grid-template-columns:280px minmax(0,1fr) 280px;gap:14px;align-items:stretch}.panel{background:var(--cream);border:3px solid #fff8;border-radius:26px;box-shadow:var(--shadow);padding:18px}
  .panel h2{font-size:1.1rem;margin:0 0 12px}.order-card{background:#fff;border:2px dashed #e0a54b;border-radius:20px;padding:14px;text-align:center}.order-name{font-weight:1000;font-size:1.2rem;margin-bottom:9px}.order-stack{display:flex;flex-direction:column-reverse;align-items:center;min-height:190px;justify-content:flex-start}
  .mini{position:relative;height:24px;width:132px;margin:-1px 0;filter:drop-shadow(0 2px 1px #0002)}.order-tip{font-size:.82rem;color:#86664a;margin:10px 0 0;line-height:1.4}
  .game{position:relative;min-height:570px;display:flex;flex-direction:column;overflow:hidden;background:linear-gradient(#c8efff 0 50%,#bfe28c 50% 59%,#f5d08a 59%);padding:0}
  .shop{position:absolute;bottom:0;left:0;right:0;height:205px;background:linear-gradient(#ffe9c4,#d69557);border-top:7px solid #f7f0df}.shop:before{content:"";position:absolute;left:50%;transform:translateX(-50%);bottom:46px;width:80%;height:94px;border-radius:18px 18px 0 0;background:repeating-linear-gradient(90deg,#fff 0 38px,#f25f5c 38px 76px);border:7px solid #814c2c}.counter{position:absolute;left:8%;right:8%;bottom:20px;height:62px;background:#74451f;border-radius:16px;border-top:12px solid #a76a38;box-shadow:0 8px 0 #503017}
  .build-zone{z-index:2;position:absolute;left:50%;bottom:72px;transform:translateX(-50%);width:min(370px,80%);height:420px;display:flex;flex-direction:column-reverse;align-items:center;justify-content:flex-start;pointer-events:none}.build-zone.shake{animation:shake .26s}@keyframes shake{25%{transform:translateX(calc(-50% - 7px))}75%{transform:translateX(calc(-50% + 7px))}}
  .plate{height:18px;width:280px;background:#e8f1f2;border:3px solid #9bb3b7;border-radius:50%;box-shadow:0 8px 0 #758e91;margin-top:2px;flex:0 0 auto}.built{position:relative;height:40px;width:230px;margin:-3px 0;filter:drop-shadow(0 4px 2px #0003);flex:0 0 auto;animation:drop .25s cubic-bezier(.2,1.5,.5,1)}@keyframes drop{from{transform:translateY(-130px) rotate(6deg);opacity:.2}}
  .message{z-index:5;position:absolute;top:18px;left:50%;transform:translateX(-50%) scale(.85);background:#31261de8;color:#fff;padding:9px 16px;border-radius:999px;font-weight:900;opacity:0;transition:.2s;white-space:nowrap}.message.show{opacity:1;transform:translateX(-50%) scale(1)}
  .ingredients{display:grid;grid-template-columns:1fr 1fr;gap:9px}.ingredient{border:0;border-radius:17px;background:#fff;padding:9px 7px;cursor:pointer;box-shadow:0 5px 0 #d9c9ad;transition:.12s;font-weight:900;color:#503821;touch-action:manipulation}.ingredient:hover{transform:translateY(-2px)}.ingredient:active{transform:translateY(4px);box-shadow:0 1px 0 #d9c9ad}.swatch{position:relative;display:block;height:31px;width:92%;margin:0 auto 6px;filter:drop-shadow(0 2px 1px #0002)}

  /* Realistic ingredient illustrations drawn entirely with CSS */
  .food{overflow:visible}
  .food.top-bun{background:linear-gradient(#f6c66b 0 34%,#dc8b2f 75%,#c87220);border:2px solid #a95c17;border-radius:55% 55% 22% 22% / 90% 90% 28% 28%;box-shadow:inset 0 5px 7px #fff7, inset 0 -5px 5px #9d4f1744}
  .food.bottom-bun{height:28px;background:linear-gradient(#f2b853,#d98329 65%,#bd641b);border:2px solid #9d5315;border-radius:22% 22% 48% 48% / 28% 28% 72% 72%;box-shadow:inset 0 4px 4px #ffe0a088,inset 0 -4px 5px #8d451944}
  .food.top-bun::after{content:"•  ·  •   ·  •";position:absolute;left:18%;right:12%;top:1px;color:#fff1b5;font-size:15px;font-weight:1000;letter-spacing:7px;text-shadow:0 1px #a46722}
  .food.bottom-bun::after{display:none}
  .food.lettuce{height:22px;background:linear-gradient(165deg,#9fdb4c,#45a52f);border:2px solid #347d26;clip-path:polygon(0 47%,8% 12%,18% 49%,30% 8%,42% 49%,55% 12%,67% 52%,80% 8%,91% 48%,100% 18%,97% 84%,86% 59%,75% 92%,61% 63%,48% 95%,35% 61%,20% 91%,8% 61%);box-shadow:inset 0 3px #d6f58c}
  .food.patty{height:31px;background:repeating-linear-gradient(8deg,#5d2e19 0 8px,#754126 8px 14px,#4b2415 14px 19px);border:3px solid #3b1e12;border-radius:44% 46% 39% 41%;box-shadow:inset 0 5px 6px #a66c3f88,inset 0 -5px 5px #23100788}
  .food.cheese{height:20px;background:linear-gradient(#ffd94f,#f5a900);border:2px solid #d58d00;clip-path:polygon(2% 0,98% 0,94% 63%,83% 55%,75% 100%,62% 55%,51% 88%,39% 54%,29% 100%,17% 57%,5% 73%);box-shadow:inset 0 3px #fff3a0}
  .food.tomato{height:22px;background:linear-gradient(#fa665b,#d72f28);border:2px solid #a91e1a;border-radius:48%;box-shadow:inset 0 4px 4px #ffafa788,inset 0 -3px #941b1b55}
  .food.tomato::before,.food.tomato::after{content:"";position:absolute;top:6px;width:28%;height:7px;border:2px solid #ffb6a9;border-radius:50%;opacity:.8}
  .food.tomato::before{left:15%}.food.tomato::after{right:15%}
  .controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.action{border:0;border-radius:15px;padding:11px 8px;font-weight:1000;cursor:pointer}.undo{background:#e6e8eb}.submit{background:var(--green);color:white}.submit:disabled{filter:grayscale(1);opacity:.55}.full{grid-column:1/-1;background:#ef476f;color:#fff}
  .help{display:flex;align-items:center;justify-content:center;gap:6px 10px;flex-wrap:wrap;font-size:.82rem;line-height:1.55;color:#765d47;margin-top:14px}.help-item{display:inline-flex;align-items:center;gap:5px;white-space:nowrap}.key{background:#fff;border:1px solid #d6c5ab;border-bottom-width:3px;border-radius:6px;padding:1px 5px;font-weight:900}
  .overlay{position:fixed;inset:0;background:#382513cc;display:grid;place-items:center;z-index:20;padding:18px}.modal{width:min(520px,100%);background:#fff8e8;border:5px solid #fff;border-radius:30px;padding:28px;text-align:center;box-shadow:0 24px 70px #0005}.modal h2{font-size:2rem;margin:5px}.modal p{line-height:1.55}.primary{border:0;border-radius:17px;background:#ff7b00;color:#fff;font-size:1.12rem;font-weight:1000;padding:13px 30px;cursor:pointer;box-shadow:0 6px 0 #bb5200}.primary:active{transform:translateY(4px);box-shadow:0 2px 0 #bb5200}.difficulty{display:flex;justify-content:center;gap:8px;margin:16px}.difficulty button{border:2px solid #e2b66d;background:#fff;border-radius:999px;padding:8px 13px;font-weight:900;cursor:pointer}.difficulty button.active{background:#31261d;color:#fff;border-color:#31261d}
  .hidden{display:none!important}.confetti{position:fixed;z-index:30;width:10px;height:16px;pointer-events:none;animation:fall 1.4s linear forwards}@keyframes fall{to{transform:translate(var(--dx),105vh) rotate(720deg);opacity:.3}}
  /* Decorative clouds removed on every screen size, including mobile. */
  .cloud,.cloud::before,.cloud::after{display:none!important;background:none!important;box-shadow:none!important}
  @media(max-width:900px){main{grid-template-columns:1fr 260px}.left{grid-column:1/-1}.left .order-card{display:grid;grid-template-columns:170px 1fr;align-items:center}.order-stack{min-height:100px}.game{min-height:510px}.hud{grid-template-columns:1fr 1fr}}
  @media(max-width:650px){.app{padding:10px}header{align-items:flex-start}.subtitle{display:none}.logo{width:48px;height:48px;transform:scale(.82);transform-origin:left top}.top-actions{flex-direction:column}.icon-btn{padding:7px 10px}main{display:flex;flex-direction:column}.left .order-card{display:block}.order-stack{min-height:160px}.game{min-height:500px;order:2}.right{order:3}.ingredients{grid-template-columns:repeat(3,1fr)}.ingredient{font-size:.78rem}.swatch{height:20px}.hud .stat{padding:8px 10px}.stat strong{font-size:1.2rem}.help{justify-content:center;gap:6px 10px;font-size:clamp(.72rem,3.2vw,.82rem);padding-inline:4px}.help-item{flex:0 0 auto}.key{padding:1px 4px}}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="brand"><div class="logo" aria-hidden="true"><span class="t"></span><span class="l"></span><span class="p"></span><span class="b"></span></div><div><h1>버거 타워</h1><p class="subtitle">주문서를 보고 재료를 정확히 쌓으세요!</p></div></div>
  <div class="top-actions"><button class="icon-btn" id="soundBtn" aria-label="소리 켜기/끄기">🔊 소리</button><button class="icon-btn" id="howBtn">? 방법</button></div>
</header>
<section class="hud">
 <div class="stat"><b>점수</b><strong id="score">0</strong></div><div class="stat"><b>남은 시간</b><strong id="time">60</strong>초</div><div class="stat"><b>완성 버거</b><strong id="served">0</strong>개</div><div class="stat"><b>콤보</b><strong id="combo">×1</strong></div>
</section>
<main>
 <aside class="panel left"><h2>🧾 오늘의 주문</h2><div class="order-card"><div><div class="order-name" id="orderName">클래식 버거</div><div class="order-stack" id="orderStack"></div></div><p class="order-tip">아래쪽 재료부터 차례대로 선택하세요.<br>잘못 쌓으면 점수가 깎여요.</p></div></aside>
 <section class="panel game" aria-label="햄버거 조립 공간"><div class="message" id="message">완벽해요!</div><div class="shop"></div><div class="counter"></div><div class="build-zone" id="buildZone"><div class="plate"></div></div></section>
 <aside class="panel right"><h2>🥬 재료 선택</h2><div class="ingredients" id="ingredients"></div><div class="controls"><button class="action undo" id="undoBtn">↶ 하나 빼기</button><button class="action submit" id="submitBtn">주문 완성</button><button class="action full" id="clearBtn">처음부터</button></div><p class="help"><span class="help-item"><span class="key">1–6</span> 재료 선택</span><span class="help-item"><span class="key">Enter</span> 완성</span><span class="help-item"><span class="key">Z</span> 되돌리기</span></p></aside>
</main>
</div>
<div class="overlay" id="startOverlay"><div class="modal"><div class="logo" style="margin:auto;transform:scale(1.35)"><span class="t"></span><span class="l"></span><span class="p"></span><span class="b"></span></div><h2>버거 타워</h2><p>손님 주문과 똑같은 순서로 햄버거를 쌓으세요.<br>연속 성공하면 콤보 점수가 올라갑니다.</p><div class="difficulty" id="difficulty"><button data-level="easy">쉬움 90초</button><button data-level="normal" class="active">보통 60초</button><button data-level="hard">어려움 45초</button></div><button class="primary" id="startBtn">게임 시작</button></div></div>
<div class="overlay hidden" id="endOverlay"><div class="modal"><h2>영업 종료!</h2><p id="resultText"></p><button class="primary" id="restartBtn">다시 도전</button></div></div>
<script>
(()=>{
'use strict';
const DATA={
 bottomBun:{name:'아랫빵',className:'bottom-bun',sound:196},
 lettuce:{name:'양상추',className:'lettuce',sound:262},
 patty:{name:'패티',className:'patty',sound:220},
 cheese:{name:'치즈',className:'cheese',sound:330},
 tomato:{name:'토마토',className:'tomato',sound:392},
 topBun:{name:'윗빵',className:'top-bun',sound:523}
};
const ORDERS=[
 {name:'클래식 버거',stack:['bottomBun','lettuce','patty','cheese','tomato','topBun']},
 {name:'치즈 버거',stack:['bottomBun','lettuce','patty','cheese','topBun']},
 {name:'토마토 버거',stack:['bottomBun','lettuce','tomato','patty','topBun']},
 {name:'더블 패티',stack:['bottomBun','lettuce','patty','cheese','patty','topBun']},
 {name:'싱싱 버거',stack:['bottomBun','lettuce','tomato','cheese','topBun']}
];
const $=s=>document.querySelector(s), ingredients=$('#ingredients'), build=$('#buildZone');
let chosen=[],order=null,score=0,served=0,combo=1,time=60,timer=null,running=false,sound=true,level='normal';
function piece(key,mini=false){const d=DATA[key],el=document.createElement('div');el.className=`${mini?'mini':'built'} food ${d.className}`;el.title=d.name;return el}
Object.keys(DATA).forEach((key,i)=>{const b=document.createElement('button');b.className='ingredient';b.dataset.key=key;b.innerHTML=`<span class="swatch food ${DATA[key].className}"></span>${i+1}. ${DATA[key].name}`;b.onclick=()=>add(key);ingredients.appendChild(b)});
function add(key){if(!running)return;if(chosen.length>=10){flash('너무 높아요!',false);return}chosen.push(key);build.appendChild(piece(key,false));playPlaceSound(key,chosen.length);updateButtons()}
function undo(){if(!running||!chosen.length)return;chosen.pop();build.lastElementChild.remove();playUndoSound();updateButtons()}
function clear(){while(build.children.length>1)build.lastElementChild.remove();chosen=[];updateButtons()}
function updateButtons(){$('#submitBtn').disabled=!chosen.length}
function renderOrder(){order=ORDERS[Math.floor(Math.random()*ORDERS.length)];$('#orderName').textContent=order.name;const box=$('#orderStack');box.innerHTML='';order.stack.forEach((k,i)=>box.appendChild(piece(k,true)))}
function submit(){if(!running||!chosen.length)return;const exact=chosen.length===order.stack.length&&chosen.every((v,i)=>v===order.stack[i]);if(exact){const pts=100*combo+Math.max(0,time);score+=pts;served++;combo=Math.min(5,combo+1);flash(`완벽! +${pts}점`,true);confetti();playSuccessSound();clear();renderOrder()}else{score=Math.max(0,score-30);combo=1;flash('주문과 달라요! -30점',false);build.classList.add('shake');setTimeout(()=>build.classList.remove('shake'),300);playErrorSound()}updateHud()}
function updateHud(){$('#score').textContent=score.toLocaleString();$('#served').textContent=served;$('#combo').textContent='×'+combo;$('#time').textContent=time;$('#time').parentElement.classList.toggle('time-low',time<=10)}
function flash(txt,ok){const m=$('#message');m.textContent=txt;m.style.background=ok?'#278c6f':'#d83b50';m.classList.add('show');setTimeout(()=>m.classList.remove('show'),950)}
function start(){clearInterval(timer);score=0;served=0;combo=1;time=level==='easy'?90:level==='hard'?45:60;running=true;clear();renderOrder();updateHud();$('#startOverlay').classList.add('hidden');$('#endOverlay').classList.add('hidden');timer=setInterval(()=>{time--;updateHud();if(time<=0)end()},1000)}
function end(){running=false;clearInterval(timer);const rank=score>=1800?'버거 마스터':score>=900?'프로 셰프':score>=400?'주방 보조':'새내기 셰프';$('#resultText').innerHTML=`최종 점수 <b>${score.toLocaleString()}점</b><br>완성한 버거 <b>${served}개</b><br><br>오늘의 등급: <b>${rank}</b>`;$('#endOverlay').classList.remove('hidden');playEndSound()}
let audioCtx=null;
function getAudio(){
 if(!sound)return null;
 try{
  if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
 }catch(e){return null}
}
function tone(freq,start,duration,type='sine',gain=.06,slideTo=null){
 const a=getAudio();if(!a)return;
 const o=a.createOscillator(),g=a.createGain();
 o.type=type;o.frequency.setValueAtTime(freq,a.currentTime+start);
 if(slideTo)o.frequency.exponentialRampToValueAtTime(slideTo,a.currentTime+start+duration);
 g.gain.setValueAtTime(.0001,a.currentTime+start);
 g.gain.exponentialRampToValueAtTime(gain,a.currentTime+start+.012);
 g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+start+duration);
 o.connect(g).connect(a.destination);o.start(a.currentTime+start);o.stop(a.currentTime+start+duration+.02);
}
function noise(start,duration,gain=.025){
 const a=getAudio();if(!a)return;
 const len=Math.max(1,Math.floor(a.sampleRate*duration)),buf=a.createBuffer(1,len,a.sampleRate),data=buf.getChannelData(0);
 for(let i=0;i<len;i++)data[i]=(Math.random()*2-1)*(1-i/len);
 const src=a.createBufferSource(),filter=a.createBiquadFilter(),g=a.createGain();
 src.buffer=buf;filter.type='lowpass';filter.frequency.value=1200;g.gain.value=gain;
 src.connect(filter).connect(g).connect(a.destination);src.start(a.currentTime+start);
}
function playPlaceSound(key,step){
 if(!sound)return;
 const base=DATA[key].sound;
 // Short wooden "tap" plus a soft pitched note; each ingredient has its own pitch.
 noise(0,.045,.018);
 tone(base,0,.075,key==='patty'?'triangle':'sine',.045,base*1.08);
 tone(base*2,.018,.045,'sine',.018);
}
function playUndoSound(){tone(260,0,.09,'triangle',.035,150)}
function playErrorSound(){tone(145,0,.18,'sawtooth',.045,95);tone(115,.07,.15,'square',.025,82)}
function playSuccessSound(){
 // Bright, original four-note major arpeggio with a soft sparkle layer.
 [523.25,659.25,783.99,1046.5].forEach((f,i)=>{tone(f,i*.075,.22,'triangle',.055);tone(f*2,i*.075+.025,.12,'sine',.018)});
 tone(1318.5,.34,.32,'sine',.04,1568);
}
function playEndSound(){[392,330,262,196].forEach((f,i)=>tone(f,i*.11,.2,'triangle',.04))}
function confetti(){for(let i=0;i<24;i++){const c=document.createElement('i');c.className='confetti';c.style.left=(45+Math.random()*10)+'vw';c.style.top='22vh';c.style.background=['#ef476f','#ffd166','#06d6a0','#4d96ff','#8338ec'][i%5];c.style.setProperty('--dx',(Math.random()*400-200)+'px');c.style.animationDelay=(Math.random()*.16)+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),1800)}}
$('#undoBtn').onclick=undo;$('#clearBtn').onclick=clear;$('#submitBtn').onclick=submit;$('#startBtn').onclick=start;$('#restartBtn').onclick=start;
$('#soundBtn').onclick=()=>{sound=!sound;$('#soundBtn').textContent=sound?'🔊 소리':'🔇 무음'};
$('#howBtn').onclick=()=>{$('#startOverlay').classList.remove('hidden')};
$('#difficulty').onclick=e=>{if(!e.target.dataset.level)return;level=e.target.dataset.level;document.querySelectorAll('#difficulty button').forEach(b=>b.classList.toggle('active',b===e.target))};
window.addEventListener('keydown',e=>{if(/^[1-6]$/.test(e.key))add(Object.keys(DATA)[+e.key-1]);else if(e.key==='Enter')submit();else if(e.key.toLowerCase()==='z')undo()});
renderOrder();updateButtons();
})();
</script>
</body>
</html>
