<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Rex Runner - White & Retro Sound Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #f7f7f7; /* 배경을 화이트 계열의 밝고 부드러운 그레이로 변경 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 250px;
        }
        canvas {
            background-color: #ffffff; /* 캔버스 배경색을 완전한 흰색으로 변경 */
            border-bottom: 3px solid #dae1e7;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            display: block;
            border-radius: 8px;
        }
        .instruction {
            margin-top: 20px;
            color: #7f8c8d;
            font-size: 14px;
            text-align: center;
            line-height: 1.6;
            font-weight: bold;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.9); /* 오버레이 배경도 화이트 반투명으로 변경 */
            color: #2c3e50;
            transition: opacity 0.3s;
            border-radius: 8px;
        }
        #overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .game-over-text {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 6px;
            margin-bottom: 12px;
            color: #ff4757;
            text-shadow: 0 2px 4px rgba(255, 71, 87, 0.2);
        }
        #overlaySubtext {
            color: #7f8c8d;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="250"></canvas>
        <div id="overlay">
            <div class="game-over-text" id="overlayText">FREE MOVE DINO</div>
            <div id="overlaySubtext">스페이스바를 누르면 시작합니다.</div>
        </div>
    </div>

    <div class="instruction">
        시작/점프: Spacebar 또는 위쪽 화살표(↑) | 숙이기/빠른낙하: 아래쪽 화살표(↓)<br>
        앞뒤 이동: 왼쪽(←) / 오른쪽(→) 화살표 키
    </div>

    <script>
        // ----------------- Web Audio API 사운드 합성 엔진 -----------------[cite: 1]
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioCtx();
            }
        }

        // 1. 점프 효과음 (주파수가 위로 튕겨 올라가는 8비트 핍 사운드)[cite: 1]
        function playJumpSound() {
            initAudio();
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'square'; // 레트로 오락기 감성의 사각파[cite: 1]
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            // 0.15초 동안 주파수를 150Hz에서 600Hz로 상승[cite: 1]
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.15); 

            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        // 2. 엎드릴 때 효과음 (주파수가 낮고 빠르게 아래로 쓸려내려가는 사운드)[cite: 1]
        function playDuckSound() {
            initAudio();
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'triangle'; // 부드러운 삼각파[cite: 1]
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.1); 

            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // 3. 게임 오버 충돌 효과음 (웅장하게 터지며 서서히 감쇄되는 로우 패스 사운드)[cite: 1]
        function playCrashSound() {
            initAudio();
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'sawtooth'; // 거친 톱니이빨파[cite: 1]
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.4); 

            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }
        // -----------------------------------------------------------------[cite: 1]

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const overlayText = document.getElementById('overlayText');
        const overlaySubtext = document.getElementById('overlaySubtext');

        const CONFIG = {
            gravity: 0.6,
            jumpForce: -12,
            duckGravity: 1.5,
            moveSpeed: 5,         
            startSpeed: 6,
            maxSpeed: 14,
            speedAcceleration: 0.0006,
            spawnInterval: { min: 70, max: 140 }
        };

        let gameState = 'START'; 
        let score = 0;
        let highScore = 0;
        let gameSpeed = CONFIG.startSpeed;
        let nextSpawnTime = 0;
        let frameCount = 0;
        
        let obstacles = [];
        let keys = {};

        // 밝아진 테마에 알맞는 비비드하고 눈에 띄는 보색 컬러 구성
        const COLORS = {
            dinoBody: '#ff4757',    // 비비드 핑크 공룡 (선인장과 완벽히 구별)
            dinoAccent: '#10ac84',  // 선인장 색상과 매핑을 맞추어 포인트 처리
            dinoLegs: '#ffa502',    
            cactus: '#2ed573',      // 선인장의 고유 컬러 (생생한 그린)
            cactusFlower: '#54a0ff',// 산뜻한 스카이 블루 꽃 포인트
            birdBody: '#1e90ff',    
            birdBeak: '#ff7f50',    
            uiText: '#57606f'       // 눈이 편안한 차콜 그레이로 조정
        };

        const dino = {
            x: 80,
            y: 190,
            width: 44,
            height: 47,
            normalHeight: 47,
            duckHeight: 30,
            vy: 0,
            isJumping: false,
            isDucking: false,
            animFrame: 0,
            
            update() {
                if (keys['ArrowLeft']) {
                    this.x -= CONFIG.moveSpeed;
                    if (this.x < 10) this.x = 10; 
                }
                if (keys['ArrowRight']) {
                    this.x += CONFIG.moveSpeed;
                    if (this.x > 400) this.x = 400; 
                }

                if (keys['ArrowDown'] && !this.isJumping) {
                    if (!this.isDucking) {
                        playDuckSound(); // 엎드릴 때 단발성 사운드 연출[cite: 1]
                    }
                    this.isDucking = true;
                    this.height = this.duckHeight;
                } else {
                    this.isDucking = false;
                    this.height = this.normalHeight;
                }

                if ((keys['Space'] || keys['ArrowUp']) && !this.isJumping && !this.isDucking) {
                    this.vy = CONFIG.jumpForce;
                    this.isJumping = true;
                    playJumpSound(); // 점프 발동시 소리 재생[cite: 1]
                }

                const currentGravity = (this.isJumping && keys['ArrowDown']) ? CONFIG.duckGravity : CONFIG.gravity;
                this.vy += currentGravity;
                this.y += this.vy;

                const groundY = canvas.height - this.height - 10; 
                if (this.y >= groundY) {
                    this.y = groundY;
                    this.vy = 0;
                    this.isJumping = false;
                }

                if (!this.isJumping) {
                    this.animFrame++;
                }
            },

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                const leftFootDown = Math.floor(this.animFrame / 6) % 2 === 0;

                if (!this.isDucking) {
                    ctx.fillStyle = COLORS.dinoBody;
                    ctx.fillRect(16, 0, 24, 16);
                    ctx.fillRect(12, 4, 4, 12);
                    ctx.fillRect(16, 16, 10, 8);
                    ctx.fillRect(4, 20, 20, 14);
                    ctx.fillRect(0, 24, 4, 8); 
                    ctx.fillRect(8, 34, 12, 4);

                    ctx.fillStyle = COLORS.dinoAccent;
                    ctx.fillRect(16, 20, 6, 10);
                    ctx.fillRect(24, 22, 4, 4); 
                    ctx.fillStyle = COLORS.dinoBody;
                    ctx.fillRect(26, 26, 4, 2);

                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(22, 3, 4, 4);
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(24, 3, 2, 2);

                    ctx.fillStyle = COLORS.dinoLegs;
                    if (this.isJumping) {
                        ctx.fillRect(10, 38, 4, 6);
                        ctx.fillRect(18, 38, 4, 6);
                    } else {
                        if (leftFootDown) {
                            ctx.fillRect(9, 38, 4, 6);
                            ctx.fillRect(9, 44, 6, 3);
                        } else {
                            ctx.fillRect(9, 38, 4, 3);
                        }
                        if (!leftFootDown) {
                            ctx.fillRect(17, 38, 4, 6);
                            ctx.fillRect(17, 44, 6, 3);
                        } else {
                            ctx.fillRect(17, 38, 4, 3);
                        }
                    }
                } else {
                    ctx.fillStyle = COLORS.dinoBody;
                    ctx.fillRect(0, 10, 32, 14);
                    ctx.fillRect(4, 6, 24, 4);
                    ctx.fillRect(28, 2, 22, 12); 
                    
                    ctx.fillStyle = COLORS.dinoAccent;
                    ctx.fillRect(12, 14, 16, 8);
                    ctx.fillRect(24, 20, 4, 4);

                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(38, 5, 4, 4);
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(40, 5, 2, 2);

                    ctx.fillStyle = COLORS.dinoLegs;
                    if (leftFootDown) {
                        ctx.fillRect(10, 24, 4, 4);
                        ctx.fillRect(10, 28, 6, 2);
                    } else {
                        ctx.fillRect(18, 24, 4, 4);
                        ctx.fillRect(18, 28, 6, 2);
                    }
                }
                ctx.restore();
            },

            reset() {
                this.x = 80;
                this.y = canvas.height - this.normalHeight - 10;
                this.vy = 0;
                this.isJumping = false;
                this.isDucking = false;
                this.height = this.normalHeight;
                this.animFrame = 0;
            }
        };

        class Obstacle {
            constructor() {
                this.x = canvas.width;
                this.type = Math.random() < 0.25 ? 'BIRD' : 'CACTUS';
                this.animFrame = 0;
                
                if (this.type === 'CACTUS') {
                    this.variant = Math.floor(Math.random() * 3); 
                    if (this.variant === 0) {
                        this.width = 16; this.height = 35;
                    } else if (this.variant === 1) {
                        this.width = 24; this.height = 46;
                    } else {
                        this.width = 45; this.height = 46;
                    }
                    this.y = canvas.height - this.height - 10;
                } else {
                    this.width = 34;
                    this.height = 24;
                    this.y = Math.random() < 0.5 ? 135 : 170;
                }
            }

            update(speed) {
                this.x -= speed;
                this.animFrame++;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                if (this.type === 'CACTUS') {
                    ctx.fillStyle = COLORS.cactus; 
                    if (this.variant === 0) {
                        ctx.fillRect(6, 0, 4, this.height);
                        ctx.fillRect(2, 10, 4, 4); ctx.fillRect(0, 12, 3, 10);
                        ctx.fillRect(10, 14, 4, 4); ctx.fillRect(13, 16, 3, 8);
                        
                        ctx.fillStyle = COLORS.cactusFlower; 
                        ctx.fillRect(6, -4, 4, 4);
                    } else if (this.variant === 1) {
                        ctx.fillRect(9, 0, 6, this.height);
                        ctx.fillRect(3, 12, 6, 6); ctx.fillRect(0, 16, 4, 15);
                        ctx.fillRect(15, 18, 6, 6); ctx.fillRect(20, 22, 4, 12);
                        
                        ctx.fillStyle = COLORS.cactusFlower;
                        ctx.fillRect(10, -4, 4, 4);
                    } else {
                        ctx.fillRect(6, 4, 5, this.height - 4);
                        ctx.fillRect(0, 16, 4, 15); ctx.fillRect(3, 12, 4, 5);
                        ctx.fillRect(22, 0, 6, this.height);
                        ctx.fillRect(14, 14, 8, 5); ctx.fillRect(14, 18, 4, 15);
                        ctx.fillRect(28, 18, 6, 5); ctx.fillRect(32, 22, 4, 12);
                        ctx.fillRect(38, 10, 4, this.height - 10);
                        
                        ctx.fillStyle = COLORS.cactusFlower;
                        ctx.fillRect(6, 0, 4, 4);
                        ctx.fillRect(23, -4, 4, 4);
                    }
                } else {
                    const wingUp = Math.floor(this.animFrame / 8) % 2 === 0;
                    
                    ctx.fillStyle = COLORS.birdBeak;
                    ctx.fillRect(0, 8, 8, 4);
                    
                    ctx.fillStyle = COLORS.birdBody;
                    ctx.fillRect(8, 8, 6, 6);
                    ctx.fillRect(14, 4, 8, 6);
                    ctx.fillRect(14, 10, 14, 6);
                    ctx.fillRect(28, 12, 6, 3); 

                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(15, 5, 2, 2);

                    if (wingUp) {
                        ctx.fillRect(16, 0, 4, 10);
                        ctx.fillStyle = COLORS.birdBeak; 
                        ctx.fillRect(12, 2, 4, 4);
                    } else {
                        ctx.fillRect(16, 16, 4, 8);
                        ctx.fillStyle = COLORS.birdBeak;
                        ctx.fillRect(18, 20, 4, 4);
                    }
                }
                ctx.restore();
            }
        }

        window.addEventListener('keydown', (e) => {
            const code = e.code === 'Space' ? 'Space' : e.key;
            keys[code] = true;

            if (code === 'Space' || code === 'ArrowUp') {
                if (gameState === 'START' || gameState === 'GAMEOVER') {
                    initGame();
                }
            }
            if(['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(code)) {
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            const code = e.code === 'Space' ? 'Space' : e.key;
            keys[code] = false;
        });

        function initGame() {
            // 브라우저 오디오 권한 허용용 첫 트리거 활성화[cite: 1]
            initAudio();
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            obstacles = [];
            score = 0;
            gameSpeed = CONFIG.startSpeed;
            frameCount = 0;
            nextSpawnTime = 0;
            dino.reset();
            gameState = 'PLAYING';
            overlay.classList.add('hidden');
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            playCrashSound(); // 충돌 폭발음 재생[cite: 1]

            if (score > highScore) {
                highScore = score;
            }
            overlayText.innerText = 'GAME OVER';
            overlaySubtext.innerText = '스페이스바를 눌러 다시 시작하세요.';
            overlay.classList.remove('hidden');
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function drawUI() {
            ctx.fillStyle = COLORS.uiText;
            ctx.font = "bold 16px 'Courier New'";
            const padScore = (num) => String(Math.floor(num)).padStart(5, '0');
            ctx.fillText(`HI ${padScore(highScore)}  ${padScore(score)}`, canvas.width - 150, 30);
        }

        function drawGround() {
            ctx.beginPath();
            ctx.strokeStyle = '#ced6e0'; /* 지면 라인 컬러를 부드러운 그레이로 매핑 */
            ctx.lineWidth = 3;
            ctx.moveTo(0, canvas.height - 10);
            ctx.lineTo(canvas.width, canvas.height - 10);
            ctx.stroke();
            
            ctx.fillStyle = '#e2e8f0';
            let speedOffset = (gameState === 'PLAYING') ? (score * 5) % 800 : 0;
            for(let i=0; i<800; i+=80) {
                let currentX = i - speedOffset;
                if(currentX < 0) currentX += 800;
                ctx.fillRect(currentX, canvas.height - 6, 4, 2);
                ctx.fillRect(currentX + 30, canvas.height - 4, 2, 1);
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGround();

            if (gameState === 'PLAYING') {
                frameCount++;
                score += 0.15;
                
                if (gameSpeed < CONFIG.maxSpeed) {
                    gameSpeed += CONFIG.speedAcceleration;
                }

                dino.update();

                if (frameCount >= nextSpawnTime) {
                    obstacles.push(new Obstacle());
                    frameCount = 0;
                    nextSpawnTime = CONFIG.spawnInterval.min + Math.random() * (CONFIG.spawnInterval.max - CONFIG.spawnInterval.min);
                }

                for (let i = obstacles.length - 1; i >= 0; i--) {
                    obstacles[i].update(gameSpeed);
                    obstacles[i].draw();

                    const dinoHitBox = {
                        x: dino.x + 6, 
                        y: dino.y + 2,
                        width: dino.isDucking ? dino.width - 4 : dino.width - 12,
                        height: dino.height - 4
                    };

                    if (checkCollision(dinoHitBox, obstacles[i])) {
                        gameOver();
                    }

                    if (obstacles[i].x + obstacles[i].width < 0) {
                        obstacles.splice(i, 1);
                    }
                }
            } else {
                obstacles.forEach(obs => obs.draw());
            }

            dino.draw();
            drawUI();

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
